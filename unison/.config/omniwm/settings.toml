monitorBarOverrides = []
monitorDwindleOverrides = []
monitorNiriOverrides = []
monitorOrientationOverrides = []

[appearance]
mode = "automatic"

[borders]
enabled = false
width = 5.0

[borders.color]
alpha = 1.0
blue = 0.979300037944676
green = 1.0
red = 0.08458520228437894

[clipboard]
historyEnabled = false
maxItemBytes = 8388608
maxItems = 200
maxTotalBytes = 67108864

[dwindle]
defaultSplitRatio = 1.0
moveToRootStable = true
singleWindowAspectRatio = "4:3"
smartSplit = true
splitWidthMultiplier = 1.0
useGlobalGaps = true

[focus]
followsMouse = false
followsWindowToMonitor = true
moveMouseToFocusedWindow = true

[gaps]
size = 3.0

[gaps.outer]
bottom = 0.0
left = 0.0
right = 0.0
top = 0.0

[general]
animationsEnabled = true
defaultLayoutType = "niri"
hotkeysEnabled = true
hyperTrigger = "Option"
ipcEnabled = true
leaderKey = "Hyper+Space"
preventSleepEnabled = false
sequenceTimeoutMilliseconds = 800
updateChecksEnabled = true

[gestures]
fingerCount = 4
invertDirection = true
mouseResizeModifierKey = "option"
scrollEnabled = true
scrollModifierKey = "optionShift"
scrollSensitivity = 5.0

[mouseWarp]
axis = "horizontal"
margin = 1
monitorOrder = []

[niri]
alwaysCenterSingleColumn = true
centerFocusedColumn = "never"
columnWidthPresets = [0.3333333333333333, 0.5, 0.6666666666666666, 1.0]
infiniteLoop = false
maxVisibleColumns = 2
singleWindowAspectRatio = "none"

[quakeTerminal]
animationDuration = 0.2
autoHide = false
enabled = true
heightPercent = 50.0
monitorMode = "focusedWindow"
opacity = 1.0
position = "center"
widthPercent = 50.0

[statusBar]
showAppNames = false
showWorkspaceName = false
useWorkspaceId = false

[workspaceBar]
backgroundOpacity = 0.1
deduplicateAppIcons = true
enabled = true
height = 24.0
hideEmptyWorkspaces = true
labelFontSize = 12.0
notchAware = true
position = "overlappingMenuBar"
reserveLayoutSpace = false
showFloatingWindows = false
showLabels = true
windowLevel = "popup"
xOffset = 0.0
yOffset = 0.0

