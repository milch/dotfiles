# rift config - migrated from aerospace
# ~/.config/rift/config.toml

[settings]
animate = true
animation_duration = 0.15
animation_fps = 120.0

default_disable = false

mouse_follows_focus = true
focus_follows_mouse = false
mouse_hides_on_focus = false

auto_focus_blacklist = []
run_on_start = []
hot_reload = true

[settings.layout]
mode = "scrolling"

[settings.layout.scrolling]
max_column_width_ratio = 0.99

[settings.layout.stack]
stack_offset = 16

[settings.layout.gaps.outer]
top    = 0
left   = 0
bottom = 0
right  = 0

[settings.layout.gaps.inner]
horizontal = 4
vertical   = 4

[settings.gestures]
enabled = true
fingers = 4

[settings.layout.scrolling.gestures]
enabled = true
fingers = 4

[settings.ui.menu_bar]
enabled = true
mode = "active"
active_label = "name"
display_style = "label"

[settings.ui.stack_line]
enabled = true
thickness = 4

[virtual_workspaces]
enabled                        = true
default_workspace_count        = 15
auto_assign_windows            = true
preserve_focus_per_workspace   = true
workspace_auto_back_and_forth  = false
reapply_app_rules_on_title_change = false

workspace_names = [
  "A",
  "B",
  "􁒘",
  "􀝋",
  "􀏆",
  "􀉉",
  "􀑁",
  "Q",
  "R",
  "􀎬",
  "􀩼",
  "􀍉",
  "W",
  "􀙄",
  "Z",
]

workspace_rules = [
  { workspace = "􀩼", layout = "bsp" },
]

app_rules = [
  # iPhone Mirroring → float
  { app_id = "com.apple.ScreenContinuity", manage = false },

  { app_id = "com.apple.AccessibilityInspector", manage = false },
  { title_substring = "Preferences", floating = true },

  # System prefs → float
  { app_id = "com.apple.systempreferences", floating = true },

  # CARROT mini window → float
  { app_id = "com.grailr.CARROT-Weather", title_substring = "Mini Window", floating = true },

  # [S]afari — browsers (index 9)
  { app_id = "com.apple.Safari",              workspace = 9 },
  { app_id = "app.zen-browser.zen",           workspace = 9 },
  { app_id = "company.thebrowser.Browser",    workspace = 9 },

  # [C]hat (index 2)
  { app_id = "com.apple.MobileSMS",           workspace = 2 },
  { app_id = "ru.keepcoder.Telegram",         workspace = 2 },

  # [D]Slack (index 3)
  { app_id = "com.tinyspeck.slackmacgap",     workspace = 3 },

  # [P]roductivity (index 6)
  { app_id = "md.obsidian",                   workspace = 6 },
  { app_id = "com.culturedcode.ThingsMac",    workspace = 6 },

  # [G]roupware (index 5)
  { app_id = "com.apple.mail",                workspace = 5 },
  { app_id = "com.flexibits.fantastical2.mac", workspace = 5 },
  { app_id = "com.busymac.busycal3",          workspace = 5 },

  # [T]erminal (index 10) — NOTE: unlike aerospace (startup-only), this rule always applies.
  # New terminals opened via rift-new-terminal script will be moved to the current workspace instead.
  { app_id = "com.github.wez.wezterm",        workspace = 10 },

  # [V]ideo (index 11)
  { app_id = "com.amazon.Amazon-Chime",       workspace = 11 },
]

[modifier_combinations]
comb1    = "Alt + Shift"
cmd_ctrl = "Meta + Alt + Ctrl"

[keys]
# toggle_space_activated moved off Alt+Z (Alt+Z = workspace Z below)
# With default_disable = false this is only needed to *disable* a space
"Meta + Alt + Ctrl + Shift + Space" = "toggle_space_activated"

# New terminal in current workspace (see bin/rift-new-terminal)
"Alt + Enter" = { exec = ["/bin/bash", "-c", "~/.local/bin/rift-new-terminal"] }

# New browser window: Arc Little Arc → fallback Safari
"Alt + Shift + Enter" = { exec = ["/bin/bash", "-c", "pgrep -x Arc && osascript -e 'tell application \"System Events\" to tell process \"Arc\" to click menu item \"New Little Arc Window\" of menu 1 of menu bar item \"File\" of menu bar 1' || osascript -e 'tell application \"Safari\" to make new document at end of documents'"] }

"Alt + Slash" = "toggle_orientation"
"Alt + Comma" = "toggle_stack"

# Switch layout engine for the active workspace
"Alt + Ctrl + 1" = { set_workspace_layout = { mode = "traditional"  } }
"Alt + Ctrl + 2" = { set_workspace_layout = { mode = "bsp"          } }
"Alt + Ctrl + 3" = { set_workspace_layout = { mode = "master_stack" } }
"Alt + Ctrl + 4" = { set_workspace_layout = { mode = "scrolling"    } }

# Focus (vim keys) — mirrors aerospace: focus left/down/up/right --boundaries all-monitors-outer-frame
"Alt + H" = { move_focus = "left" }
"Alt + J" = { move_focus = "down" }
"Alt + K" = { move_focus = "up" }
"Alt + L" = { move_focus = "right" }

# Move windows
"comb1 + H" = { move_node = "left" }
"comb1 + J" = { move_node = "down" }
"comb1 + K" = { move_node = "up" }
"comb1 + L" = { move_node = "right" }

# Resize
"Alt + Shift + Minus" = "resize_window_shrink"
"Alt + Shift + Equal" = "resize_window_grow"

# Workspace navigation (left-hand only keys from aerospace)
"Alt + A" = { switch_to_workspace = 0  }  # A
"Alt + B" = { switch_to_workspace = 1  }  # B
"Alt + C" = { switch_to_workspace = 2  }  # Chat
"Alt + D" = { switch_to_workspace = 3  }  # Slack
"Alt + F" = { switch_to_workspace = 4  }  # F
"Alt + G" = { switch_to_workspace = 5  }  # Groupware
"Alt + P" = { switch_to_workspace = 6  }  # Productivity
"Alt + Q" = { switch_to_workspace = 7  }  # Q
"Alt + R" = { switch_to_workspace = 8  }  # R
"Alt + S" = { switch_to_workspace = 9  }  # Safari
"Alt + T" = { switch_to_workspace = 10 }  # Terminal
"Alt + V" = { switch_to_workspace = 11 }  # Video
"Alt + W" = { switch_to_workspace = 12 }  # W
"Alt + X" = { switch_to_workspace = 13 }  # X
"Alt + Z" = { switch_to_workspace = 14 }  # Z

# Move window to workspace then follow (aerospace: move-node-to-workspace + workspace X)
# Implemented via rift-move-follow script: move-window + switch in sequence
"Alt + Shift + A" = { exec = ["/bin/bash", "-c", "~/.local/bin/rift-move-follow 0" ] }
"Alt + Shift + B" = { exec = ["/bin/bash", "-c", "~/.local/bin/rift-move-follow 1" ] }
"Alt + Shift + C" = { exec = ["/bin/bash", "-c", "~/.local/bin/rift-move-follow 2" ] }
"Alt + Shift + D" = { exec = ["/bin/bash", "-c", "~/.local/bin/rift-move-follow 3" ] }
"Alt + Shift + F" = { exec = ["/bin/bash", "-c", "~/.local/bin/rift-move-follow 4" ] }
"Alt + Shift + G" = { exec = ["/bin/bash", "-c", "~/.local/bin/rift-move-follow 5" ] }
"Alt + Shift + P" = { exec = ["/bin/bash", "-c", "~/.local/bin/rift-move-follow 6" ] }
"Alt + Shift + Q" = { exec = ["/bin/bash", "-c", "~/.local/bin/rift-move-follow 7" ] }
"Alt + Shift + R" = { exec = ["/bin/bash", "-c", "~/.local/bin/rift-move-follow 8" ] }
"Alt + Shift + S" = { exec = ["/bin/bash", "-c", "~/.local/bin/rift-move-follow 9" ] }
"Alt + Shift + T" = { exec = ["/bin/bash", "-c", "~/.local/bin/rift-move-follow 10"] }
"Alt + Shift + V" = { exec = ["/bin/bash", "-c", "~/.local/bin/rift-move-follow 11"] }
"Alt + Shift + W" = { exec = ["/bin/bash", "-c", "~/.local/bin/rift-move-follow 12"] }
"Alt + Shift + X" = { exec = ["/bin/bash", "-c", "~/.local/bin/rift-move-follow 13"] }
"Alt + Shift + Z" = { exec = ["/bin/bash", "-c", "~/.local/bin/rift-move-follow 14"] }

# Join windows into containers (aerospace: join-with)
"cmd_ctrl + H" = { join_window = "left"  }
"cmd_ctrl + J" = { join_window = "down"  }
"cmd_ctrl + K" = { join_window = "up"    }
"cmd_ctrl + L" = { join_window = "right" }

# Fullscreen and floating
# aerospace: cmd-alt-ctrl-f = fullscreen
"cmd_ctrl + F" = "toggle_fullscreen"
# aerospace: cmd-alt-ctrl-t = layout floating tiling
"cmd_ctrl + T" = "toggle_window_floating"

# Switch to last workspace
# aerospace alt-tab was: move-workspace-to-monitor --wrap-around next
# rift has no equivalent; switch_to_last_workspace is the closest available action
"Alt + Tab" = "switch_to_last_workspace"

# Debug
"Alt + Shift + Semicolon" = "debug"
